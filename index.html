<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMDCG — Plateforme DCG / DSCG</title>
    <meta name="description" content="Simulateur d'entretien IA, QCM, cas pratiques et flashcards pour préparer le DCG et DSCG." />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #080b14; color: #e8e4d9; }
      @keyframes fsu { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fi  { from { opacity:0; } to { opacity:1; } }
      @keyframes glow { 0%,100% { box-shadow:0 0 12px rgba(226,201,126,.25),0 0 24px rgba(226,201,126,.1); } 50% { box-shadow:0 0 20px rgba(226,201,126,.45),0 0 40px rgba(226,201,126,.2); } }
      @keyframes bglow { 0%,100% { border-color:rgba(226,201,126,.15); } 50% { border-color:rgba(226,201,126,.35); } }
      @keyframes spin  { to { transform:rotate(360deg); } }
      @keyframes puls  { 0%,100% { opacity:.2; transform:scale(.8); } 50% { opacity:1; transform:scale(1.1); } }
      @keyframes o1    { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(40px,30px) scale(1.1); } }
      @keyframes o2    { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(-30px,-20px) scale(1.08); } }
      @keyframes scan  { from { top:-1px; } to { top:100vh; } }
      @keyframes shim  { 0%,100% { opacity:.4; } 50% { opacity:1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
